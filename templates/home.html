{% extends 'base.html' %}

{% block content %}

<div class="text-center">
    <h1 class="mb-4">Team Task Manager</h1>

    <p class="lead">
        Manage projects, tasks, and teams efficiently.
    </p>

    {% if user.is_authenticated %}

        <a href="/dashboard/" class="btn btn-primary">
            Go to Dashboard
        </a>

    {% else %}

        <a href="{% url 'login' %}" class="btn btn-success">
            Login
        </a>

    {% endif %}
</div>

{% endblock %}
